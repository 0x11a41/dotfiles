outputs = "Active"
log_level = "warn"
position = "Top"
app_launcher_cmd = "fuzzel --terminal='alacritty -e' --placeholder=' Launch using integrated graphics'"
enable_esc_key = true
region = "en-IN"
language = "en-US"


[osd]
enabled = true
timeout = 850

[animations]
enabled = true

[modules]
left = ["AppLauncher", [ "Workspaces" ]]
center = [ "Tempo", "MediaPlayer" ]
right = [ "SystemInfo", [ "Tray", "Privacy", "Settings" ], "Notifications"]

[notifications]
format = "%m/%d %H:%M"
show_timestamps = true
show_bodies = true
grouped = true
toast = true
toast_position = "top_right"
toast_timeout = 3000
toast_limit = 4
toast_max_height = 150
# blocklist = ["blueman", "^org\\.gnome\\."]

[window_title]
truncate_title_after_length = 48

[media_player]
indicator_format = "Icon"
# max_title_length = 50

[[CustomModule]]
name = "ThemeSwitcher"
icon = "🌗"
command = "~/.config/hypr/switch_theme.sh"

[[CustomModule]]
name = "AppLauncher"
type = "Button"
icon = "󱗼"
command = "fuzzel --placeholder=' Launch using integrated graphics'"

[settings]
lock_cmd = "playerctl --all-players pause; hyprlock &"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "blueman-manager"
# remove_airplane_btn = true
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
volume_step = 4
brightness_step = 3
max_volume = 150

[[settings.CustomButton]]
name = "Dark Mode"
icon = "🌗"
command = "~/.config/hypr/switch_theme.sh"
# tooltip = "Toggle dark mode"

[system_info]
indicators = ["UploadSpeed", "DownloadSpeed" ]
interval = 5

[tempo]
clock_format = "%a %d %b %R"

[appearance]
font_name = "Adwaita Sans"
style = "Gradient"
opacity = 1.0
scale_factor = 1.0
primary_color = "#DAC6FA"
success_color = "#a6e3a1"
text_color = "#F8F8F2"         # Off-white
workspace_colors = [ "#DAC6FA", "#b4befe", "#cba6f7" ]


[appearance.menu]
opacity = 1.0
backdrop = 0.3


[appearance.danger_color]
base = "#FF6B6B"               # Soft Red
weak = "#F4A460"               # Sandy Brown

[appearance.background_color]
base = "#1e1e2e"
weak = "#313244"
strong = "#45475a"

[appearance.secondary_color]
base = "#1a1a1a"               # Dark Grey
