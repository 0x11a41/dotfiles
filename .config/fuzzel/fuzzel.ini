[main]
namespace = "launcher"
font=Adwaita:size=13
placeholder=" Type to search"
prompt="🔎 "
dpi-aware = no
icons-enabled = yes
minimal-lines=yes
tabs=4
line-height=20
inner-pad=8
vertical-pad=16
horizontal-pad=20
fields=filename,name,generic,exec,keywords,categories
show-actions = yes
anchor= center

[border]
width=2
radius=8
selection-radius=4

[dmenu]
mode=text

[colors]
background=1e1e2eff
text=f8f8f2ff
border = dac6faff
input=f8f8f2ff
prompt=f8f8f2ff
selection=dac6faff
selection-text=1a1a1aff
