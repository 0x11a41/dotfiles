$accent = rgba(218, 198, 250, 1.0)
$accent_alpha = rgba(218, 198, 250, 0.2)

general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    brightness = 0.58
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +'%H')</b>"
    color = rgba(255, 255, 255, 1)
    font_size = 120
    font_family = Maple Mono NF
    position = 0, 240
    halign = center
    valign = center
    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +'%M')</b>"
    color = $accent
    font_size = 120
    font_family = Maple Mono NF
    position = 0, 110
    halign = center
    valign = center
    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:60000] echo "<b>$(date +'%A')</b>"
    color = rgba(255, 255, 255, 0.85)
    font_size = 20
    font_family = Maple Mono NF
    position = 0, 10
    halign = center
    valign = center
    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%d %b')"
    color = rgba(255, 255, 255, 0.85)
    font_size = 14
    font_family = Maple Mono NF
    position = 0, -20
    halign = center
    valign = center
    shadow_passes = 0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = $accent
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgba(255, 255, 255, 1.0)
    font_family = Maple Mono NF
    check_color = $accent
    fail_color = rgba(204, 34, 34, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Enter password</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}
