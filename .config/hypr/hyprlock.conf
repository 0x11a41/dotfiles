$accent = rgba(218, 198, 250, 1.0)
$accent_alpha = rgba(218, 198, 250, 0.2)

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    brightness = 0.58
}

label {
    monitor =
    text = <b>$TIME</b>
    color = rgba(255, 255, 255, 0.9)
    font_size = 140
    font_family = Maple Mono NF
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:60000] echo "<i>$(date +%H | awk '{if ($1 < 12) print "Good morning"; else if ($1 < 18) print "Good afternoon"; else print "Good evening"}'), $USER</i>"
    color = rgba(255, 255, 255, 0.85)
    font_size = 20
    font_family = Maple Mono NF
    position = 0, 00
    halign = center
    valign = center
    shadow_passes = 0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = $accent
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgba(255, 255, 255, 1.0)
    font_family = Maple Mono NF
    check_color = $accent
    fail_color = rgba(204, 34, 34, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Enter password</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}
